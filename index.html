<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Especialistas em marketing local para Tambaú e região.">
  <title>Nexux Marketing Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    /* EFEITO HERO: Logo que encolhe e fica FIXA no topo */
    .sticky-header {
      position: fixed; /* Mudamos para fixed para garantir que não saia do lugar */
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      transition: all 0.4s ease;
      padding: 2rem 1rem;
      pointer-events: none;
    }

    .sticky-header.scrolled {
      padding: 0.6rem 1rem;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
      pointer-events: auto;
    }

    .logo-img {
      width: 260px;
      transition: all 0.4s ease;
      filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.3));
      pointer-events: auto;
    }

    .scrolled .logo-img {
      width: 130px; /* Encolhe pela metade */
    }

    /* Ajuste para o conteúdo não bater na logo fixa */
    .content-wrapper {
      padding-top: 180px; /* Dá espaço para a logo grande aparecer */
    }
  </style>
</head>
<body class="bg-[#020617] text-white">

  <div class="fixed inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.15),_transparent_30%)] pointer-events-none"></div>

  <header id="main-header" class="sticky-header">
    <img id="logo" src="/logo5.webp" alt="Nexux" class="logo-img" />
  </header>

  <div class="content-wrapper relative mx-auto flex flex-col items-center w-full max-w-[420px] px-4 pb-20">
    
    <div class="w-full rounded-[32px] border border-sky-400/20 bg-slate-950/80 p-6 shadow-2xl backdrop-blur-md">
      
      <div class="text-center">
        <h1 class="bg-gradient-to-b from-white via-sky-200 to-blue-500 bg-clip-text text-2xl font-black text-transparent uppercase tracking-tight">
          Quer mais clientes para o seu negócio?
        </h1>
        <p class="mt-4 text-[11px] font-bold text-sky-300/90 uppercase tracking-widest">
          Google Ads • Redes Sociais • Sites
        </p>
        <div class="mx-auto mt-6 h-[1px] w-24 bg-sky-500/30"></div>
      </div>

      <div class="mt-8 space-y-4">
        <a href="https://wa.me/5519974038573" target="_blank" class="flex items-center justify-center gap-3 rounded-full border border-sky-400/50 bg-gradient-to-r from-slate-900 to-blue-900 py-4 text-sm font-bold shadow-lg transition-transform active:scale-95">
          <img src="/whatsapp.png" class="h-5 w-5" alt="Zap">
          <span>Falar no WhatsApp</span>
        </a>

        <a href="https://www.instagram.com/nexuxmarketingdigital/" target="_blank" class="flex items-center justify-center gap-3 rounded-full border border-white/10 bg-slate-900/80 py-4 text-sm font-semibold transition-transform active:scale-95">
          <img src="/instagram.png" class="h-5 w-5" alt="Insta">
          <span>Ver Instagram</span>
        </a>

        <a href="https://share.google/kksENSuBRdt0Dmy5I" target="_blank" class="flex items-center justify-center gap-3 rounded-full border border-white/10 bg-slate-900/80 py-4 text-[12px] font-semibold transition-transform active:scale-95">
          <img src="/mapa.png" class="h-5 w-5" alt="Maps">
          <span>Ver Empresa no Google</span>
        </a>
      </div>

      <div class="mt-10 border-t border-white/10 pt-8">
        <h2 class="text-center text-lg font-bold text-sky-200">Nossos Serviços</h2>
        <div id="carousel-container" class="mt-5 overflow-hidden rounded-2xl border border-sky-500/20 bg-black/40 p-1">
          <div class="relative overflow-hidden rounded-xl">
            <div id="carousel-track" class="flex transition-transform duration-500">
              <div class="min-w-full">
                <img src="/servico-1.png" class="h-48 w-full object-cover">
              </div>
              <div class="min-w-full">
                <img src="/servico-2.png" class="h-48 w-full object-cover">
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="./script.js"></script>
  <script>
    const header = document.getElementById('main-header');
    window.addEventListener('scroll', () => {
      // Quando passar de 50px de rolagem, ativa o modo "encolhido"
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
