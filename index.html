<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexux Marketing Digital | Atraia Clientes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      background-color: #000;
      scroll-behavior: smooth;
    }
    .logo-anim {
      transition: all 0.2s ease-out;
      will-change: transform, opacity;
    }
    #track::-webkit-scrollbar { display: none; }
    .dot { transition: all 0.3s ease; }
    .dot.active { background-color: #38bdf8; width: 1.5rem; }
  </style>
</head>
<body class="bg-black text-white font-sans">
  <div class="min-h-screen overflow-x-hidden relative">
    
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.16),_transparent_28%)] pointer-events-none"></div>
    <div class="fixed left-3 top-3 h-[96%] w-[calc(100%-24px)] rounded-[36px] border border-sky-400/25 pointer-events-none"></div>

    <div class="relative mx-auto flex min-h-screen w-full max-w-md flex-col items-center justify-start p-4 pt-12">
      
      <div class="w-full rounded-[36px] border border-sky-400/35 bg-zinc-950/90 px-6 py-8 shadow-[0_0_60px_rgba(56,189,248,0.15)] backdrop-blur-sm">
        
        <div class="text-center">
          <div class="mb-8 flex justify-center overflow-visible sticky top-0 z-50">
            <img id="logo" src="/logo5.webp" alt="Nexux" class="w-80 logo-anim object-contain" 
                 style="filter: drop-shadow(0 0 16px rgba(56, 189, 248, 0.45));">
          </div>

          <h1 class="bg-gradient-to-b from-white via-sky-300 to-blue-600 bg-clip-text text-4xl font-black tracking-tight text-transparent">
            Nexux Digital
          </h1>
          <p class="mt-2 text-sm font-semibold uppercase tracking-[0.35em] text-sky-200/90">Marketing de Elite</p>
          <div class="mx-auto mt-4 h-[1px] w-40 bg-gradient-to-r from-transparent via-sky-400/70 to-transparent"></div>
        </div>

        <div class="mt-10 space-y-1.5">
          
          <a href="https://wa.me/5519974038573" target="_blank" class="relative group flex items-center justify-center rounded-xl border border-sky-300/70 bg-gradient-to-r from-[#0a192f] via-zinc-900 to-[#0f2942] px-5 py-4 text-[15px] font-bold text-sky-100 shadow-lg active:scale-95 transition-all">
            <img src="/whatsapp.png" class="absolute left-6 h-7 w-7 object-contain" alt="">
            <span>Falar no WhatsApp</span>
          </a>

          <a href="https://instagram.com/nexuxmarketingdigital/" target="_blank" class="relative group flex items-center justify-center rounded-xl border border-sky-400/45 bg-zinc-900/85 px-5 py-4 text-[15px] font-semibold text-sky-100 active:scale-95 transition-all">
            <img src="/instagram.png" class="absolute left-6 h-7 w-7 object-contain" alt="">
            <span>Ver Instagram</span>
          </a>

          <a href="https://share.google/kksENSuBRdt0Dmy5I" target="_blank" class="relative group flex items-center justify-center rounded-xl border border-sky-400/45 bg-zinc-900/85 px-5 py-4 text-[15px] font-semibold text-sky-100 active:scale-95 transition-all">
            <img src="/mapa.png" class="absolute left-6 h-7 w-7 object-contain" alt="">
            <span>Empresa no Google</span>
          </a>

          <a href="https://g.page/r/CS_WHBu00g1wEBM/review" target="_blank" class="relative group flex items-center justify-center rounded-xl border border-sky-400/45 bg-zinc-900/85 px-5 py-4 text-[15px] font-semibold text-sky-100 active:scale-95 transition-all">
            <img src="/avaliacao.png" class="absolute left-6 h-7 w-7 object-contain" alt="">
            <span>Avaliar no Google</span>
          </a>

        </div>

        <div id="servicos" class="mt-10 border-t border-sky-400/20 pt-6">
          <div class="group overflow-hidden rounded-[28px] border border-sky-400/25 bg-zinc-900/70 p-3" id="carousel-area">
            <div id="track" class="flex transition-transform duration-700 ease-out" style="transform: translateX(0%)">
              <div class="relative min-w-full"><img src="/servico-1.png" class="h-64 w-full object-cover rounded-[22px]" /></div>
              <div class="relative min-w-full"><img src="/servico-2.png" class="h-64 w-full object-cover rounded-[22px]" /></div>
              <div class="relative min-w-full"><img src="/servico-3.png" class="h-64 w-full object-cover rounded-[22px]" /></div>
            </div>
          </div>
          <div class="mt-4 flex justify-center gap-2">
            <div class="dot active h-2 w-2 rounded-full bg-zinc-600"></div>
            <div class="dot h-2 w-2 rounded-full bg-zinc-600"></div>
            <div class="dot h-2 w-2 rounded-full bg-zinc-600"></div>
          </div>
        </div>

        <p class="mt-12 text-center text-[10px] tracking-widest text-zinc-600 uppercase">© 2026 Nexux Digital</p>

      </div>
    </div>
  </div>

  <script>
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const logo = document.getElementById('logo');
      const scale = Math.max(0.72, 1 - scrollY * 0.0012);
      const translateY = Math.min(scrollY * 0.18, 30);
      const opacity = Math.max(0.82, 1 - scrollY * 0.001);
      logo.style.transform = `translateY(-${translateY}px) scale(${scale})`;
      logo.style.opacity = opacity;
    });

    const track = document.getElementById('track');
    const carouselArea = document.getElementById('carousel-area');
    const dots = document.querySelectorAll('.dot');
    let index = 0;
    const totalSlides = 3;
    let touchStartX = 0;

    function updateCarousel() {
      track.style.transform = `translateX(-${index * 100}%)`;
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function next() { index = (index + 1) % totalSlides; updateCarousel(); }
    function prev() { index = (index === 0) ? totalSlides - 1 : index - 1; updateCarousel(); }

    carouselArea.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    carouselArea.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      if (touchStartX - touchEndX > 50) next();
      if (touchEndX - touchStartX > 50) prev();
      resetTimer();
    });

    let timer = setInterval(next, 12000);
    function resetTimer() { clearInterval(timer); timer = setInterval(next, 12000); }
  </script>
</body>
</html>
